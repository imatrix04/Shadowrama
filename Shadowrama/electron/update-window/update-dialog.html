<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: rgba(20, 20, 26, 0.92);
    --border: rgba(255, 255, 255, 0.08);
    --accent: #7c5cff;
    --accent-glow: rgba(124, 92, 255, 0.45);
    --text: #f4f4f6;
    --text-dim: rgba(244, 244, 246, 0.55);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Bricolage Grotesque', sans-serif;
    -webkit-app-region: drag;
    user-select: none;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 16px;
    opacity: 0;
    transform: scale(0.92) translateY(10px);
    transition: opacity 0.45s cubic-bezier(.16,1,.3,1), transform 0.45s cubic-bezier(.16,1,.3,1);
  }

  .card.in { opacity: 1; transform: scale(1) translateY(0); }
  .card.out { opacity: 0; transform: scale(0.94) translateY(6px); transition: all 0.18s ease; }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 20px 60px rgba(0,0,0,0.55),
      0 0 40px var(--accent-glow);
    overflow: hidden;
    clip-path: inset(0 round 16px);
  }

  .glow-orb {
    position: absolute;
    top: -40px;
    right: -40px;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, var(--accent-glow), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    animation: pulse 3.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.15); }
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    -webkit-app-region: no-drag;
  }

  .icon {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), #4f3bd6);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px var(--accent-glow);
  }

  .icon svg { width: 16px; height: 16px; }

  h2 {
    margin: 0;
    font-size: 14.5px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  p {
    margin: 8px 0 0;
    font-size: 12.5px;
    line-height: 1.45;
    color: var(--text-dim);
    -webkit-app-region: no-drag;
  }

  .progress-track {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    margin-top: 14px;
    -webkit-app-region: no-drag;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    transition: width 0.2s ease;
  }

  #progress-label {
    font-size: 11.5px;
    color: var(--text-dim);
    margin-top: 6px;
    display: inline-block;
    -webkit-app-region: no-drag;
  }

  .actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 14px;
    -webkit-app-region: no-drag;
  }

  button {
    border: none;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 9px;
    cursor: pointer;
    transition: transform 0.15s ease, filter 0.15s ease, background 0.15s ease;
    -webkit-app-region: no-drag;
  }

  button:active { transform: scale(0.96); }

  .secondary {
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
  }
  .secondary:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  .primary {
    background: linear-gradient(135deg, var(--accent), #5a42e0);
    color: #fff;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .primary:hover { filter: brightness(1.12); }
</style>
</head>
<body>

  <div class="card in" id="card">
    <div class="card-inner">
      <div class="glow-orb"></div>

      <div>
        <div class="header">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 2v13m0 0l-4-4m4 4l4-4M5 21h14" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h2 id="title">Mise à jour disponible</h2>
        </div>
        <p id="subtitle">Une nouvelle version de Shadowrama est prête à être téléchargée.</p>

        <div id="progress-container" style="display:none;">
          <div class="progress-track">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <span id="progress-label">0%</span>
        </div>
      </div>

      <div class="actions" id="actions">
        <button class="secondary" id="btn-later">Plus tard</button>
        <button class="primary" id="btn-download">Télécharger</button>
      </div>
    </div>
  </div>

<script>
  const title = document.getElementById('title')
  const subtitle = document.getElementById('subtitle')
  const actions = document.getElementById('actions')
  const progressContainer = document.getElementById('progress-container')
  const progressFill = document.getElementById('progress-fill')
  const progressLabel = document.getElementById('progress-label')

  document.getElementById('btn-later').addEventListener('click', () => {
    window.updateAPI.later()
  })

  document.getElementById('btn-download').addEventListener('click', () => {
    window.updateAPI.startDownload()
    subtitle.textContent = 'Téléchargement en cours…'
    progressContainer.style.display = 'block'
    actions.innerHTML = ''
  })

  window.updateAPI.onStatus((data) => {
    if (data.state === 'downloading') {
      progressFill.style.width = data.percent + '%'
      const speed = (data.bytesPerSecond / 1024 / 1024).toFixed(1)
      progressLabel.textContent = `${data.percent}% — ${speed} Mo/s`
    }

    if (data.state === 'downloaded') {
      title.textContent = 'Mise à jour prête'
      subtitle.textContent = 'Redémarre l\'application pour l\'installer.'
      progressContainer.style.display = 'none'
      actions.innerHTML = '<button class="primary" id="btn-install">Redémarrer maintenant</button>'
      document.getElementById('btn-install').addEventListener('click', () => {
        window.updateAPI.installNow()
      })
    }

    if (data.state === 'error') {
      subtitle.textContent = 'Erreur : ' + data.message
      progressContainer.style.display = 'none'
    }
  })
</script>

</body>
</html>
